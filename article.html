<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article — Sofiane Coly</title>
    <meta name="description" content="Article de Sofiane Coly, avocat en droit social au Barreau de Lyon. Fondateur de DAIRIA Avocats, DAIRIA IA et En Clair.">
    <link rel="canonical" href="https://sofianecoly.com/article.html">

    <!-- Open Graph (defaults, overridden by JS) -->
    <meta property="og:title" content="Article — Sofiane Coly">
    <meta property="og:description" content="Article de Sofiane Coly, avocat en droit social à Lyon.">
    <meta property="og:type" content="article">
    <meta property="og:locale" content="fr_FR">
    <meta property="og:url" content="https://sofianecoly.com/article.html">
    <meta property="og:image" content="https://sofianecoly.com/assets/og-image.jpg">
    <meta property="og:site_name" content="Sofiane Coly">

    <!-- Twitter (defaults, overridden by JS) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Article — Sofiane Coly">
    <meta name="twitter:description" content="Article de Sofiane Coly, avocat en droit social à Lyon.">
    <meta name="twitter:image" content="https://sofianecoly.com/assets/og-image.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #e8842c; --orange-light: #F5A623;
            --navy: #1e2d3d; --navy-light: #2a3f52;
            --cream: #faf8f5; --white: #ffffff;
            --text-primary: #1e2d3d; --text-secondary: #5a6a7a; --text-light: #8a96a3;
            --border: rgba(30, 45, 61, 0.08);
            --shadow-md: 0 4px 20px rgba(30, 45, 61, 0.08);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Inter', sans-serif; color: var(--text-primary); background: var(--cream); line-height: 1.7; }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(250,248,245,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1200px; margin: 0 auto; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-size: 1.2rem; font-weight: 700; color: var(--navy); text-decoration: none; }
        .nav-logo span { color: var(--orange); }
        .nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: var(--orange); }

        .article-hero { padding: 8rem 2rem 3rem; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color: white; }
        .article-hero-inner { max-width: 800px; margin: 0 auto; }
        .article-hero .back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; display: inline-block; margin-bottom: 1.5rem; transition: color 0.3s; }
        .article-hero .back:hover { color: var(--orange); }
        .article-hero h1 { font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 800; line-height: 1.25; letter-spacing: -1px; margin-bottom: 1.5rem; }
        .article-meta { display: flex; align-items: center; gap: 1.5rem; font-size: 0.9rem; color: rgba(255,255,255,0.7); }

        .article-image { max-width: 900px; margin: -2rem auto 0; padding: 0 2rem; position: relative; z-index: 10; }
        .article-image img { width: 100%; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }

        .article-body { max-width: 750px; margin: 0 auto; padding: 3rem 2rem 4rem; }
        .article-content { font-size: 1.1rem; line-height: 1.85; color: #374151; }
        .article-content h2 { color: var(--navy); font-weight: 700; font-size: 1.6rem; margin: 2.5rem 0 1rem; }
        .article-content h3 { color: var(--orange); font-weight: 600; font-size: 1.3rem; margin: 2rem 0 0.75rem; }
        .article-content p { margin-bottom: 1.5rem; }
        .article-content blockquote { border-left: 4px solid var(--orange); padding: 1rem 1.5rem; margin: 2rem 0; background: var(--cream); border-radius: 0 8px 8px 0; font-style: italic; color: var(--navy); }
        .article-content a { color: var(--orange); }
        .article-content ul, .article-content ol { margin-bottom: 1.5rem; padding-left: 2rem; }
        .article-content li { margin-bottom: 0.5rem; }
        .article-content img { max-width: 100%; border-radius: 12px; margin: 2rem 0; }

        .article-footer { max-width: 750px; margin: 0 auto; padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); }
        .article-footer a { color: var(--navy); text-decoration: none; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 50px; transition: all 0.3s; }
        .article-footer a:hover { background: var(--navy); color: white; }
        .share-links { display: flex; gap: 0.75rem; }
        .share-links a { width: 40px; height: 40px; border-radius: 50%; background: var(--cream); display: flex; align-items: center; justify-content: center; color: var(--navy); transition: all 0.3s; }
        .share-links a:hover { background: var(--navy); color: white; }

        .loading { text-align: center; padding: 6rem 2rem; color: var(--text-light); font-size: 1.1rem; }
        footer { text-align: center; padding: 3rem 2rem; border-top: 1px solid var(--border); color: var(--text-light); font-size: 0.85rem; }
        footer a { color: var(--orange); text-decoration: none; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .article-hero { padding: 7rem 1.5rem 2rem; }
            .article-body { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="nav-logo">Sofiane <span>Coly</span></a>
            <ul class="nav-links">
                <li><a href="/#about">À propos</a></li>
                <li><a href="/blog.html" style="color: var(--orange);">Blog</a></li>
                <li><a href="/#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div id="article-container">
        <div class="loading">Chargement de l'article...</div>
    </div>

    <footer>
        <p>© 2025 Sofiane Coly — <a href="https://dairia-avocats.com">DAIRIA Avocats</a> · <a href="https://dairia.ai">DAIRIA IA</a> · <a href="https://enclair.media">En Clair</a> · <a href="https://gerermesatmp.com">GérerMesATMP</a></p>
        <p style="margin-top: 0.75rem;"><a href="/mentions-legales.html">Mentions légales</a> · <a href="/politique-confidentialite.html">Politique de confidentialité</a></p>
    </footer>

    <script>
        const WP_API = 'https://dairia-blog.bl-nk.io/wp-json/wp/v2';

        function decodeEntities(text) {
            const el = document.createElement('textarea');
            el.innerHTML = text;
            return el.value;
        }

        function formatDate(dateStr) {
            return new Date(dateStr).toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function getFeaturedImage(post) {
            try { return post._embedded['wp:featuredmedia'][0].source_url; } catch { return null; }
        }

        async function loadArticle() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) { window.location.href = '/blog.html'; return; }

            try {
                const res = await fetch(`${WP_API}/posts?_embed&slug=${encodeURIComponent(slug)}`);
                const posts = await res.json();
                if (!posts.length) { window.location.href = '/blog.html'; return; }

                const post = posts[0];
                const title = decodeEntities(post.title.rendered);
                const img = getFeaturedImage(post);
                const wordCount = post.content.rendered.replace(/<[^>]*>/g, '').split(/\s+/).length;
                const readTime = Math.max(1, Math.ceil(wordCount / 250));
                const url = encodeURIComponent(window.location.href);

                document.title = `${title} — Sofiane Coly`;
                const excerpt = decodeEntities(post.excerpt.rendered.replace(/<[^>]*>/g, '')).substring(0, 160);
                document.querySelector('meta[name="description"]').content = excerpt;

                // Update OG and Twitter meta
                const articleUrl = `https://sofianecoly.com/article.html?slug=${post.slug}`;
                document.querySelector('link[rel="canonical"]').href = articleUrl;
                document.querySelector('meta[property="og:title"]').content = `${title} — Sofiane Coly`;
                document.querySelector('meta[property="og:description"]').content = excerpt;
                document.querySelector('meta[property="og:url"]').content = articleUrl;
                if (img) {
                    document.querySelector('meta[property="og:image"]').content = img;
                    document.querySelector('meta[name="twitter:image"]').content = img;
                }
                document.querySelector('meta[name="twitter:title"]').content = `${title} — Sofiane Coly`;
                document.querySelector('meta[name="twitter:description"]').content = excerpt;

                // Inject JSON-LD Article
                const jsonLd = document.createElement('script');
                jsonLd.type = 'application/ld+json';
                jsonLd.textContent = JSON.stringify({
                    "@context": "https://schema.org",
                    "@type": "Article",
                    "headline": title,
                    "description": excerpt,
                    "image": img || "https://sofianecoly.com/assets/og-image.jpg",
                    "datePublished": post.date,
                    "dateModified": post.modified,
                    "author": { "@type": "Person", "name": "Sofiane Coly", "url": "https://sofianecoly.com" },
                    "publisher": { "@type": "Person", "name": "Sofiane Coly" },
                    "mainEntityOfPage": { "@type": "WebPage", "@id": articleUrl }
                });
                document.head.appendChild(jsonLd);

                document.getElementById('article-container').innerHTML = `
                    <section class="article-hero">
                        <div class="article-hero-inner">
                            <a href="/blog.html" class="back">← Retour au blog</a>
                            <h1>${title}</h1>
                            <div class="article-meta">
                                <span>Sofiane Coly</span>
                                <span>${formatDate(post.date)}</span>
                                <span>${readTime} min de lecture</span>
                            </div>
                        </div>
                    </section>
                    ${img ? `<div class="article-image"><img src="${img}" alt="${title}"></div>` : ''}
                    <article class="article-body">
                        <div class="article-content">${post.content.rendered}</div>
                    </article>
                    <div class="article-footer">
                        <a href="/blog.html">← Tous les articles</a>
                        <div class="share-links">
                            <a href="https://www.linkedin.com/sharing/share-offsite/?url=${url}" target="_blank" rel="noopener" title="LinkedIn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                            </a>
                            <a href="https://twitter.com/intent/tweet?url=${url}&text=${encodeURIComponent(title)}" target="_blank" rel="noopener" title="Twitter">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            </a>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('article-container').innerHTML = '<div class="loading">Erreur de chargement.</div>';
                console.error(err);
            }
        }

        loadArticle();
    </script>
</body>
</html>
